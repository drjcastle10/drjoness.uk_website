<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>D R Jones: Home</title>
</head>
<body>
    <div id="page-container">
        <header> 
            <h1>D R Jones</h1>
            <p>Third Year Student at the University of Birmingham</p>
        </header>
        <div class="container">
            <div id="links-column-container"></div>

            <div class="data-column">
                <div class="data-row">
                    <h2>My CV</h2>
                    <p>Here is a copy of my CV</p>
                </div>
                <div class="data-row">
                    <iframe class="pdf" src="Website_CV.pdf" style="border:none;"></iframe>
                </div>
            </div>
        </div>

        <footer>
        <p>&copy; 2026 D R Jones. All rights reserved.</p>
        </footer>
    </div>
    <script>
        fetch('/includes/links-column.html')
            .then(response => response.text())
            .then(data => {
                const container = document.getElementById('links-column-container');
                container.innerHTML = data;
                container.classList.add('loaded');
            });
    </script>
</body>
</html>
